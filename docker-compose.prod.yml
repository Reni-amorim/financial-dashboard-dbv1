version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: financial_db_docker
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: financial_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - financial_network

  backend:
    build:
      context: ./backend
    restart: always
    env_file: .env
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - financial_network
      - meli_net
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./frontend
    restart: always
    depends_on:
      - backend
    networks:
      - financial_network
    environment:
      API_BASE_URL: http://backend:8000/api/v1
    command: streamlit run app.py --server.port 8501 --server.address 0.0.0.0

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/certbot/conf:/etc/letsencrypt
      - ./nginx/certbot/www:/var/www/certbot
    depends_on:
      - backend
      - frontend
    networks:
      - financial_network

volumes:
  postgres_data:

networks:
  financial_network:
    driver: bridge
  meli_net:
    external: true
    name: projeto-meli_app_rede
